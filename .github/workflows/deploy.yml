name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check
        run: |
          node -c server.js
          node -c database.js
          node -c public/js/app.js

      # === Render 自动部署 ===
      # 在 GitHub Secrets 中设置 RENDER_DEPLOY_HOOK
      # 获取方式：Render 仪表盘 → Settings → Deploy Hook
      - name: Deploy to Render
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"

      # === Railway 自动部署 ===
      # 在 GitHub Secrets 中设置 RAILWAY_TOKEN
      # 获取方式：railway login → railway token
      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}

      # === Zeabur 自动部署 ===
      # 在 GitHub Secrets 中设置 ZEABUR_TOKEN 和 ZEABUR_SERVICE_ID
      - name: Deploy to Zeabur
        if: env.ZEABUR_TOKEN != ''
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
          ZEABUR_SERVICE_ID: ${{ secrets.ZEABUR_SERVICE_ID }}
        run: |
          npx -y zeabur deploy --token "$ZEABUR_TOKEN" --service-id "$ZEABUR_SERVICE_ID"
