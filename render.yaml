services:
  - type: web
    name: hanlin-forum
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
